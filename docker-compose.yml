services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ctiris
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-svc:
    build: ./db-svc
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ctiris
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  ingestion-svc:
    build:
      context: .
      dockerfile: ingestion-svc/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ctiris
    depends_on:
      db-svc:
        condition: service_completed_successfully

  query-svc:
    build: ./query-svc
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ctiris
      ALLOWED_ORIGIN: http://localhost:5173
    depends_on:
      db-svc:
        condition: service_completed_successfully

  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - query-svc

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - gateway

volumes:
  postgres-data:
