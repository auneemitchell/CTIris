services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctiris
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  hello-docker:
    image: alephnaaught/hello-docker:v1.0
    ports:
      - "8080:8080"

volumes:
  postgres-data: