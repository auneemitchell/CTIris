# Rate-limiting zone: track by client IP, 10 MB state, 10 req/s steady rate.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;

    # Docker's embedded DNS resolver — required when proxy_pass contains a variable.
    resolver 127.0.0.11 valid=10s;

    # ---------------------------------------------------------------------------
    # /api/feeds* write traffic → ingestion-svc; reads → query-svc
    # ---------------------------------------------------------------------------
    location ~ ^/api/(feeds.*)$ {
        limit_req zone=api burst=20 nodelay;

        set $upstream query-svc:8000;
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            set $upstream ingestion-svc:8001;
        }

        proxy_pass         http://$upstream/$1$is_args$args;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ---------------------------------------------------------------------------
    # All /api/* traffic → query-svc (read-only routes)
    # ---------------------------------------------------------------------------
    location ~ ^/api/(.*)$ {
        limit_req zone=api burst=30 nodelay;

        proxy_pass         http://query-svc:8000/$1$is_args$args;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Serve the favicon as a static file.
    location = /favicon.ico {
        root       /usr/share/nginx/html;
        access_log off;
    }

}
