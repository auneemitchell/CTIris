name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-ingestion-svc:
    name: Test ingestion-svc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ingestion-svc/requirements-dev.txt

      - name: Install shared db package
        run: pip install --no-cache-dir db-svc/

      - name: Install dependencies
        run: pip install -r ingestion-svc/requirements-dev.txt

      - name: Run tests
        run: pytest ingestion-svc/tests/ -v --cov=ingestion-svc --cov-report=term-missing

  test-query-svc:
    name: Test query-svc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: query-svc/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r query-svc/requirements-dev.txt

      - name: Run tests
        run: pytest query-svc/tests/ -v --cov=query-svc --cov-report=term-missing

  lint-frontend:
    name: Lint & build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # TODO: fix frontend lint errors before re-enabling
      #   - StixBrowser.tsx:67,73 — react-hooks/set-state-in-effect (setState called synchronously in useEffect)
      #   - StixData.tsx:26 — @typescript-eslint/no-explicit-any
      # - name: Lint
      #   working-directory: frontend
      #   run: npm run lint

      - name: Type-check & build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build (all services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build db-svc
        run: docker build -t ctiris-db-svc db-svc/

      - name: Build ingestion-svc
        # Build context must be repo root — Dockerfile copies db-svc/ as a shared package
        run: docker build -f ingestion-svc/Dockerfile -t ctiris-ingestion-svc .

      - name: Build query-svc
        run: docker build -t ctiris-query-svc query-svc/

      - name: Build frontend
        run: docker build -t ctiris-frontend frontend/

      - name: Build gateway
        run: docker build -t ctiris-gateway gateway/
